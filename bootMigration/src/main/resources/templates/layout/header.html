<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  공통 헤더 (Thymeleaf Fragment).

  [Spring Security 도입 후 변경사항]
  - Before: ${session.loginUser != null}으로 세션에서 직접 로그인 상태 확인
  - After:  sec:authorize="isAuthenticated()"로 Spring Security 인증 상태 확인
  - 닉네임: sec:authentication="principal.nickname"으로 CustomUserDetails에서 추출
  - 로그아웃: POST 방식으로 변경 (CSRF 토큰 필수, th:action이 자동 삽입)
-->
<header th:fragment="header" class="header">
    <div class="header-inner">
        <a href="/" class="header-logo">
            Blog<span class="logo-dot"></span>
        </a>
        <nav class="header-nav">
            <!-- 로그인 상태 -->
            <th:block sec:authorize="isAuthenticated()">
                <span class="user-info" sec:authentication="principal.nickname">유저님</span>
                <span class="user-info">님</span>
                <a href="/post/write" class="btn-write">새 글 작성</a>
                <a href="/user/edit">내 정보</a>
                <form th:action="@{/user/logout}" method="post" style="display:inline;">
                    <button type="submit">로그아웃</button>
                </form>
            </th:block>
            <!-- 비로그인 상태 -->
            <th:block sec:authorize="!isAuthenticated()">
                <a href="/user/login">로그인</a>
                <a href="/user/register" class="btn-write">회원가입</a>
            </th:block>
        </nav>
    </div>
</header>
</html>
