<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="main-content">
        <div class="form-container">
            <h1 class="form-title">로그인</h1>
            <div class="form-card">
                <!--
                  [Spring Security 도입 후 변경사항]
                  - Before: ${error}로 Controller에서 전달한 에러 메시지 표시
                  - After:  ${param.error}로 Spring Security가 URL에 추가한 error 파라미터 확인
                  - name="email": SecurityConfig에서 usernameParameter("email")로 설정했으므로 유지
                  - th:action: Thymeleaf가 자동으로 CSRF 토큰을 hidden input으로 삽입
                -->
                <div th:if="${param.error}" class="alert alert-error">이메일 또는 비밀번호가 올바르지 않습니다.</div>
                <form th:action="@{/user/login}" method="post">
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">로그인</button>
                </form>
            </div>
            <p class="form-footer">
                계정이 없으신가요? <a href="/user/register">회원가입</a>
            </p>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
