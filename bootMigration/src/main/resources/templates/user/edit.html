<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 수정</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="main-content">
        <div class="form-container">
            <h1 class="form-title">내 정보 수정</h1>
            <div class="form-card">
                <div th:if="${error}" class="alert alert-error" th:text="${error}">에러 메시지</div>
                <form action="/user/update" method="post">
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <!--
                          [JSP 대응]
                          JSP:   value="${user.email}"
                          Thymeleaf: th:value="${user.email}"
                          → EL 표현식이 th: 속성으로 변환됨.
                        -->
                        <input type="email" id="email" th:value="${user.email}" disabled
                               style="background: var(--color-border-light); cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label for="nickname">닉네임</label>
                        <input type="text" id="nickname" name="nickname" th:value="${user.nickname}"
                               placeholder="새 닉네임을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="password">새 비밀번호</label>
                        <input type="password" id="password" name="password"
                               placeholder="변경하지 않으려면 비워두세요">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">수정하기</button>
                </form>

                <!-- 회원탈퇴 영역 -->
                <div class="danger-zone">
                    <p class="danger-zone-title">⚠ 위험 구역</p>
                    <form action="/user/delete" method="post"
                          onsubmit="return confirm('정말 탈퇴하시겠습니까? 작성한 모든 게시글이 삭제됩니다.');">
                        <button type="submit" class="btn btn-danger btn-block">회원탈퇴</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
