<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="main-content">
        <div class="post-list">
            <div th:if="${#lists.isEmpty(postList)}" class="empty-state">
                <div class="empty-state-icon">📝</div>
                <p class="empty-state-text">아직 작성된 글이 없습니다</p>
                <p class="empty-state-sub">첫 번째 글을 작성해보세요!</p>
            </div>

            <a th:each="post : ${postList}"
               th:href="@{/post/{id}(id=${post.id})}"
               class="post-card">
                <h2 class="post-card-title" th:text="${post.title}">제목</h2>
                <p class="post-card-content" th:text="${post.content}">내용</p>
                <div class="post-card-meta">
                    <span th:text="${post.authorNickname}">작성자</span>
                    <span class="separator">·</span>
                    <span th:text="${post.createdAt.toLocalDate()}">2026-01-01</span>
                </div>
            </a>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
