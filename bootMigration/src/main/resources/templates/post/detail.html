<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title}">게시글 제목</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{layout/header :: header}"></div>

    <main class="main-content">
        <div class="post-detail">
            <h1 class="post-detail-title" th:text="${post.title}">제목</h1>
            <div class="post-detail-meta">
                <span class="author" th:text="${post.authorNickname}">작성자</span>
                <span class="separator">·</span>
                <span th:text="${post.createdAt.toLocalDate()}">2026-01-01</span>
                <!--
                  [JSP 대응]
                  JSP에서 날짜 비교: ${post.updatedAt != post.createdAt}
                  Thymeleaf에서도 동일하게 비교 가능.
                -->
                <th:block th:if="${post.updatedAt != post.createdAt}">
                    <span class="separator">·</span>
                    <span>수정됨</span>
                </th:block>
            </div>
            <div class="post-detail-content" th:text="${post.content}">게시글 내용</div>

            <!--
              [Spring Security 도입 후 변경사항]
              Before: ${session.loginUser != null && session.loginUser.id == post.userId}
              After:  ${loginUserId != null && loginUserId == post.userId}
              → Controller에서 @AuthenticationPrincipal로 추출한 ID를 model에 전달
            -->
            <div th:if="${loginUserId != null && loginUserId == post.userId}"
                 class="post-detail-actions">
                <a th:href="@{/post/{id}/edit(id=${post.id})}" class="btn btn-secondary btn-sm">수정</a>
                <form th:action="@{/post/{id}/delete(id=${post.id})}" method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?');" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
